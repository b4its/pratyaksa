services:

  # ============================================================
  # DATABASE SERVICES (profile: db)
  # ============================================================

  postgres:
    image: postgres:16-alpine
    container_name: pratyaksa-postgres
    profiles: ["db", "backend", "full"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pratyaksa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pratyaksa_secret}
      POSTGRES_DB: ${POSTGRES_DB:-pratyaksa_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pratyaksa} -d ${POSTGRES_DB:-pratyaksa_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pratyaksa-net

  mongodb:
    image: mongo:7.0
    container_name: pratyaksa-mongodb
    profiles: ["db", "backend", "full"]
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-pratyaksa}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-pratyaksa_secret}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-pratyaksa}
    volumes:
      - mongo_data:/data/db
    ports:
      - "${MONGO_PORT:-27017}:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pratyaksa-net

  # ============================================================
  # BACKEND SERVICE — Rust + Actix-Web (profile: backend)
  # ============================================================

  backend:
    build:
      context: ./backend_rust
      dockerfile: Dockerfile
    container_name: pratyaksa-backend
    profiles: ["backend", "full"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      DATABASE_URL: postgresql://${POSTGRES_USER:-pratyaksa}:${POSTGRES_PASSWORD:-pratyaksa_secret}@postgres:5432/${POSTGRES_DB:-pratyaksa_db}
      MONGODB_URL: mongodb://${MONGO_USER:-pratyaksa}:${MONGO_PASSWORD:-pratyaksa_secret}@mongodb:27017
      MONGODB_NAME: ${MONGO_DB:-pratyaksa}
      JWT_SECRET: ${JWT_SECRET:-super_secret_pratyaksa_key_change_in_production}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-24}
      RUST_LOG: ${RUST_LOG:-info}
    # Backend hanya expose ke network internal, tidak langsung ke host
    expose:
      - "8080"
    networks:
      - pratyaksa-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://0.0.0.0:8080/api/v1/health 2>/dev/null | grep -q ok || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 10s

  # ============================================================
  # FRONTEND SERVICE — Nuxt 4 (profile: full)
  # ============================================================

  frontend:
    build:
      context: ./frontend_nuxt
      dockerfile: Dockerfile
      args:
        # API melewati Nginx sebagai reverse proxy — path relatif
        NUXT_PUBLIC_API_BASE: /api/v1
    container_name: pratyaksa-frontend
    profiles: ["full"]
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      # Di dalam container, Nuxt memanggil /api/v1 yang diteruskan Nginx ke backend
      NUXT_PUBLIC_API_BASE: /api/v1
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
    expose:
      - "3000"
    networks:
      - pratyaksa-net

  # ============================================================
  # NGINX — Reverse proxy, satu pintu masuk (profile: full)
  # Routing:
  #   /api/*  → backend:8080
  #   /*      → frontend:3000
  # ============================================================

  nginx:
    image: nginx:1.27-alpine
    container_name: pratyaksa-nginx
    profiles: ["full"]
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${APP_PORT:-80}:80"
    networks:
      - pratyaksa-net

  # ============================================================
  # OPTIONAL: Mongo Express UI (profile: tools)
  # ============================================================

  mongo-express:
    image: mongo-express:1.0.2
    container_name: pratyaksa-mongo-express
    profiles: ["tools"]
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER:-pratyaksa}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD:-pratyaksa_secret}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USER:-pratyaksa}:${MONGO_PASSWORD:-pratyaksa_secret}@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    ports:
      - "${MONGO_EXPRESS_PORT:-8081}:8081"
    networks:
      - pratyaksa-net

  # ============================================================
  # OPTIONAL: pgAdmin UI (profile: tools)
  # ============================================================

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: pratyaksa-pgadmin
    profiles: ["tools"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@pratyaksa.id}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - pratyaksa-net

# ============================================================
# VOLUMES & NETWORKS
# ============================================================

volumes:
  postgres_data:
    name: pratyaksa_postgres_data
  mongo_data:
    name: pratyaksa_mongo_data
  pgadmin_data:
    name: pratyaksa_pgadmin_data

networks:
  pratyaksa-net:
    name: pratyaksa-network
    driver: bridge
